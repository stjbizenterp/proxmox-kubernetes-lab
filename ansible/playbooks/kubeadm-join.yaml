---
- name: Fetch Kubernetes join command from control plane
  hosts: k8s_control_plane
  become: true
  gather_facts: false

  tasks:
    - name: Generate fresh kubeadm join command
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: kubeadm_join_command
      changed_when: false

    - name: Store join command for worker play
      ansible.builtin.set_fact:
        worker_join_command: "{{ kubeadm_join_command.stdout }}"


- name: Join worker nodes to Kubernetes cluster
  hosts: k8s_workers
  become: true
  gather_facts: true

  tasks:
    - name: Check if node already joined the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Join worker node to cluster
      ansible.builtin.command:
        cmd: "{{ hostvars[groups['k8s_control_plane'][0]]['worker_join_command'] }} --node-name={{ inventory_hostname }}"
      when: not kubelet_conf.stat.exists
      register: kubeadm_join_result

    - name: Display kubeadm join output
      ansible.builtin.debug:
        var: kubeadm_join_result.stdout_lines
      when: kubeadm_join_result is changed