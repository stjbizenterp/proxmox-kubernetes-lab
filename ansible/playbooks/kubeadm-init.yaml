---
- name: Initialize Kubernetes control plane
  hosts: k8s_control_plane
  become: true
  gather_facts: true

  tasks:
    - name: Check if Kubernetes control plane is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_admin_conf

    - name: Initialize Kubernetes control plane with kubeadm
      ansible.builtin.command:
        cmd: >
          kubeadm init
          --apiserver-advertise-address={{ k8s_control_plane_endpoint }}
          --pod-network-cidr={{ pod_network_cidr }}
          --node-name={{ inventory_hostname }}
      when: not kubeadm_admin_conf.stat.exists
      register: kubeadm_init_result

    - name: Display kubeadm init output
      ansible.builtin.debug:
        var: kubeadm_init_result.stdout_lines
      when: kubeadm_init_result is changed

    - name: Ensure devops kubeconfig directory exists
      ansible.builtin.file:
        path: /home/devops/.kube
        state: directory
        owner: devops
        group: devops
        mode: "0755"

    - name: Copy admin kubeconfig for devops user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/devops/.kube/config
        remote_src: true
        owner: devops
        group: devops
        mode: "0600"

    - name: Install Flannel CNI
      ansible.builtin.command:
        cmd: kubectl apply -f {{ flannel_manifest_url }}
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: flannel_apply_result
      changed_when: "'created' in flannel_apply_result.stdout or 'configured' in flannel_apply_result.stdout"

    - name: Display Flannel apply output
      ansible.builtin.debug:
        var: flannel_apply_result.stdout_lines

    - name: Generate kubeadm join command
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: kubeadm_join_command
      changed_when: false

    - name: Save join command on control plane
      ansible.builtin.copy:
        dest: /tmp/kubeadm_join_command.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          {{ kubeadm_join_command.stdout }}