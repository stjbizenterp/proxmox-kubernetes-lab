apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-lab-html
  namespace: devops-lab
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>DevOps Lab</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          background: #0f172a;
          color: #e2e8f0;
          text-align: center;
          padding-top: 80px;
        }
        .card {
          background: #1e293b;
          border-radius: 12px;
          padding: 32px;
          max-width: 700px;
          margin: auto;
          box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
          color: #38bdf8;
        }
        code {
          background: #020617;
          padding: 4px 8px;
          border-radius: 6px;
          color: #facc15;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>DevOps Lab App</h1>
        <p>This application is running on a Kubernetes cluster hosted on Proxmox.</p>
        <p>Namespace: <code>devops-lab</code></p>
        <p>Managed with Kubernetes YAML manifests stored in GitHub.</p>
      </div>
    </body>
    </html>
