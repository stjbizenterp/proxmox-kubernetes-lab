apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-lab
  namespace: devops-lab
  labels:
    app: nginx-lab
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: nginx-lab.10.10.10.201.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-lab
                port:
                  number: 80
