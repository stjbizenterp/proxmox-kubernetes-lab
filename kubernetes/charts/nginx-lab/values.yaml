namespace:
  name: devops-lab

app:
  name: nginx-lab
  labels:
    app: nginx-lab

replicaCount: 3

image:
  repository: ghcr.io/stjbizenterp/devops-lab-nginx
  tag: 50ae70b
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

nodePort:
  enabled: true
  name: nginx-lab-nodeport
  port: 80
  targetPort: 80
  nodePort: 30080

ingress:
  enabled: true
  className: nginx
  host: nginx-lab.10.10.10.211.nip.io
  path: /
  pathType: Prefix

configMapHtml:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 30s
  labels:
    release: kube-prometheus-stack

prometheusRule:
  enabled: true
  labels:
    release: kube-prometheus-stack

html:
  title: DevOps Lab
  heading: DevOps Lab App - Helm Managed
  body: This application is running on a Kubernetes cluster hosted on Proxmox.
  namespaceText: devops-lab
  footer: Managed with a Helm chart stored in GitHub.

resources: {}
