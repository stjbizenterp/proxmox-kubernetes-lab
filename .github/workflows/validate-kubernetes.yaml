name: Validate Kubernetes Manifests and Helm Chart

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Kubernetes and Helm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint nginx-lab chart
        run: |
          helm lint kubernetes/charts/nginx-lab

      - name: Render nginx-lab Helm chart
        run: |
          mkdir -p rendered
          helm template nginx-lab kubernetes/charts/nginx-lab > rendered/nginx-lab.yaml

      - name: Validate rendered Kubernetes manifests
        run: |
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            rendered/nginx-lab.yaml
